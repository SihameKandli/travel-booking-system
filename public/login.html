<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="/stile/stile.css">
    <script src="/script/login.js"  ></script>
</head>
<body>

    <nav class="navbar">
        <a href="/Scopri_il_Marocco.html"><img src="/immagini/Logo.png" alt="Logo Scopri il Marocco"></a>
        <h1>SCOPRI IL MAROCCO</h1>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">&#9776;;</label>
        
        <ul class="menu">
            <li><a href="/Scopri_il_Marocco.html">Home</a></li>
            <li><a href="/Destinazioni.html">Destinazioni</a></li>

        </ul>
    
    </nav>

    <header class="title-contatti">
        <h1>Accesso Utente</h1>
    </header>

        <section class="container-log-reg"> 
            <h2>Login</h2>
            <div id="loginMessageArea" class="form-message-area"></div>
            
            <form id="loginForm">

                <div class="form-group">
                    <label for="loginEmail"> <strong>Email: </strong></label>
                    <input type="email" id="loginEmail" name="email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword"><strong>Password:</strong></label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>

                <div class="form-action">
                    <button type="submit" class="pulsante"><strong>Accedi</strong></button>
                </div>

            </form>

            <p class="link">
                Non hai un account? <a href="/registrazione.html">Registrati ora</a>
            </p>
        </section>

    
    <footer>
        <p> &copy;2025 Scopri il Marocco. </p>
        <div class="social-icons">
            <a href="https://www.facebook.com/"><img src="/immagini/facebook.png" alt="facebook" ></a>
